AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Job Scout v2 - DevSecOps job discovery pipeline.
  JSearch API -> Score -> DynamoDB dedup -> S3 reports -> Discord.

Resources:

  # -----------------------------------------------------------------------
  # IAM Role - what the Lambda function is allowed to do
  # Lambda assumes this role at runtime to make AWS API calls.
  # Every permission is scoped to a specific resource ARN - no wildcards.
  # -----------------------------------------------------------------------
  JobScoutRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: job-scout-lambda-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: JobScoutPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt JobScoutTable.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "${ReportsBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/job-scout/*"

  # -----------------------------------------------------------------------
  # Lambda Function - the core pipeline, runs as a container image
  # PackageType: Image = Docker container pulled from ECR at invocation
  # -----------------------------------------------------------------------
  JobScoutFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: job-scout
      PackageType: Image
      Code:
        ImageUri: "217617105289.dkr.ecr.us-east-1.amazonaws.com/job-scout:latest"
      Role: !GetAtt JobScoutRole.Arn
      Timeout: 300
      MemorySize: 512
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref JobScoutTable
          S3_BUCKET: !Ref ReportsBucket

  # EventBridge rule - fires the Lambda on a cron schedule
  JobScoutScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: job-scout-daily
      Description: Daily job scout trigger
      ScheduleExpression: "cron(0 12 ? * * *)"
      State: ENABLED
      Targets:
        - Id: JobScoutFunction
          Arn: !GetAtt JobScoutFunction.Arn

  # Grants EventBridge permission to invoke the Lambda
  JobScoutLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt JobScoutFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt JobScoutScheduleRule.Arn

  # -----------------------------------------------------------------------
  # DynamoDB Table - deduplication store
  # -----------------------------------------------------------------------
  JobScoutTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: job-scout-seen
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # -----------------------------------------------------------------------
  # S3 Bucket - HTML report storage
  # -----------------------------------------------------------------------
  ReportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "job-scout-reports-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldReports
            Status: Enabled
            ExpirationInDays: 90

  ReportsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReportsBucket
      PolicyDocument:
        Statement:
          - Sid: DenyNonHTTPS
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt ReportsBucket.Arn
              - !Sub "${ReportsBucket.Arn}/*"
            Condition:
              Bool:
                "aws:SecureTransport": "false"

Outputs:
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt JobScoutFunction.Arn
  TableName:
    Description: DynamoDB table name
    Value: !Ref JobScoutTable
  BucketName:
    Description: S3 reports bucket name
    Value: !Ref ReportsBucket
